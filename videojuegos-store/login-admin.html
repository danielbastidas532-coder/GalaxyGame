<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — GameGalaxy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="stars-bg"></div>

<div class="auth-wrapper">
  <div class="auth-container">
    <div class="auth-logo">
      <img src="logo.png" alt="GameGalaxy" style="height:52px;width:180px;object-fit:contain;object-position:center" onerror="this.style.display='none'">
    </div>

    <div style="text-align:center;margin-bottom:24px">
      <span style="background:rgba(123,47,255,0.15);border:1px solid rgba(123,47,255,0.4);color:#aa88ff;
                   padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:2px">
        🛡️ PANEL ADMINISTRATIVO
      </span>
    </div>

    <h2 class="auth-title" style="background:linear-gradient(135deg,#7b2fff,#c553ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">
      Acceso Admin
    </h2>
    <p class="auth-subtitle">Solo personal autorizado</p>

    <div id="formError" class="alert-gg alert-gg-danger mb-3" style="display:none"></div>

    <form class="form-gg" id="loginForm" onsubmit="handleLogin(event)">
      <div class="mb-3">
        <label class="form-label">Correo del administrador</label>
        <div style="position:relative">
          <i class="bi bi-envelope" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);z-index:1"></i>
          <input type="email" class="form-control" id="email" placeholder="admin@correo.com" style="padding-left:44px" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <div style="position:relative">
          <i class="bi bi-shield-lock" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);z-index:1"></i>
          <input type="password" class="form-control" id="password" placeholder="••••••••" style="padding-left:44px" required>
          <button type="button" onclick="togglePw()"
                  style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer">
            <i class="bi bi-eye" id="pwIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-gg-primary w-100" style="padding:13px;font-size:15px;background:linear-gradient(135deg,#7b2fff,#c553ff)">
        <i class="bi bi-shield-check me-2"></i> Acceder al Panel
      </button>
    </form>

    <div class="auth-divider"><span>o</span></div>

    <div class="text-center">
      <a href="register-admin.html" style="color:#aa88ff;text-decoration:none;font-weight:700;font-size:14px">
        <i class="bi bi-person-plus me-1"></i> Registrar nuevo administrador
      </a>
    </div>

    <div style="margin-top:16px;padding:12px;background:rgba(123,47,255,0.05);border:1px solid rgba(123,47,255,0.1);border-radius:8px">
      <p style="font-size:12px;color:var(--text-muted);margin:0;text-align:center">
        Demo: <strong style="color:#aa88ff">admin@gamegalaxy.com</strong> / <strong style="color:#aa88ff">Admin123!</strong>
      </p>
    </div>

    <div class="text-center mt-3">
      <a href="index.html" style="color:var(--text-muted);text-decoration:none;font-size:13px">
        <i class="bi bi-arrow-left me-1"></i> Volver al inicio
      </a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script>
  if (Storage.getCurrentAdmin()) window.location.href = 'admin/dashboard.html';

  function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const result = Auth.loginAdmin(email, password);

    if (result.ok) {
      showToast(result.msg, 'success');
      setTimeout(() => window.location.href = 'admin/dashboard.html', 800);
    } else {
      showFormError('formError', result.msg);
    }
  }

  function togglePw() {
    const input = document.getElementById('password');
    const icon = document.getElementById('pwIcon');
    input.type = input.type === 'password' ? 'text' : 'password';
    icon.className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
  }
</script>
</body>
</html>
