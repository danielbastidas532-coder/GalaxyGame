<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito — GameGalaxy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="stars-bg"></div>

<nav class="navbar-gg navbar navbar-expand-lg">
  <div class="container px-4">
    <a class="navbar-brand" href="/usuario/tienda.html">
      <img src="/img/image1.png" class="brand-logo" alt="GameGalaxy" onerror="this.style.display='none'">
      <span style="font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--text-primary);margin-left:8px">GameGalaxy</span>
    </a>
    <div class="d-flex align-items-center gap-3">
      <a href="tienda.html" class="btn-gg-secondary" style="text-decoration:none;padding:7px 14px;font-size:13px;display:inline-flex;align-items:center;gap:6px">
        <i class="bi bi-arrow-left"></i> Seguir comprando
      </a>
      <button onclick="Auth.logout()" class="btn-gg-danger" style="padding:7px 14px;font-size:12px">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </div>
</nav>

<div class="container py-5" style="position:relative;z-index:1;max-width:1000px">
  <div class="page-header">
    <h1 style="font-family:'Orbitron',monospace;font-size:24px">
      🛒 Tu <span class="text-gradient-blue">Carrito</span>
    </h1>
  </div>

  <!-- EMPTY STATE -->
  <div id="cartEmpty" style="display:none">
    <div class="empty-state" style="padding:80px 20px">
      <i class="bi bi-cart-x"></i>
      <h4>Carrito vacío</h4>
      <p>No has añadido ningún juego todavía.</p>
      <a href="tienda.html" class="btn-gg-primary mt-4" style="text-decoration:none;display:inline-flex;align-items:center;gap:8px;padding:12px 28px">
        <i class="bi bi-controller"></i> Explorar tienda
      </a>
    </div>
  </div>

  <!-- CART CONTENT -->
  <div id="cartSummary" style="display:none">
    <div class="row g-4">
      <!-- LEFT: Items -->
      <div class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <span style="font-weight:700;font-size:15px">Productos</span>
            <span id="cartItemCount" style="color:var(--text-muted);font-size:13px;margin-left:8px"></span>
          </div>
          <button class="btn-gg-danger" onclick="Carrito.clear()" style="padding:6px 14px;font-size:12px;display:inline-flex;align-items:center;gap:6px">
            <i class="bi bi-trash"></i> Vaciar carrito
          </button>
        </div>
        <div id="cartItems"></div>
      </div>

      <!-- RIGHT: Summary -->
      <div class="col-lg-4">
        <div class="cart-total-section" style="position:sticky;top:80px">
          <h5 style="font-family:'Orbitron',monospace;font-size:14px;margin-bottom:20px;color:var(--text-secondary);
                     text-transform:uppercase;letter-spacing:1px">Resumen del pedido</h5>

          <div class="cart-total-line">
            <span style="color:var(--text-secondary);font-size:14px">Subtotal</span>
            <span id="cartSubtotal" style="font-weight:600">$0.00</span>
          </div>
          <div class="cart-total-line">
            <span style="color:var(--text-secondary);font-size:14px">IVA (16%)</span>
            <span id="cartTaxes" style="color:var(--text-muted)">$0.00</span>
          </div>
          <div style="padding:16px 0 12px;display:flex;justify-content:space-between;align-items:center">
            <span style="font-weight:700;font-size:16px">Total</span>
            <span class="cart-total-final" id="cartTotal">$0.00</span>
          </div>

          <a href="pago.html" class="btn-gg-primary w-100"
             style="text-decoration:none;display:flex;align-items:center;justify-content:center;
                    gap:8px;padding:14px;font-size:15px;margin-top:4px">
            <i class="bi bi-credit-card"></i> Proceder al Pago
          </a>

          <div style="margin-top:20px;padding:14px;background:rgba(0,230,118,0.04);
                      border:1px solid rgba(0,230,118,0.12);border-radius:8px;text-align:center">
            <div style="display:flex;justify-content:center;gap:16px;margin-bottom:6px;font-size:18px">
              🔒 ⚡ ✅
            </div>
            <p style="font-size:11px;color:var(--text-muted);margin:0">
              Compra segura · Entrega digital inmediata
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/carrito.js"></script>
<script>
  Auth.requireUser();
  Carrito.init();
</script>
</body>
</html>
