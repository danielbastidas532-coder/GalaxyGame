<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videojuegos — GameGalaxy Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="admin-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="/img/image1.png" alt="GameGalaxy" style="height:38px;width:150px;object-fit:cover;border-radius:8px;border:1px solid rgba(0,180,255,0.2)" onerror="this.style.display='none'">
      <div style="margin-top:6px"><span style="font-size:9px;letter-spacing:2px;color:var(--text-muted)">PANEL ADMIN</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Principal</div>
      <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      </ul>
      <div class="sidebar-section">Catálogo</div>
      <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link active" href="juegos.html"><i class="bi bi-controller"></i> Videojuegos</a></li>
        <li class="nav-item"><a class="nav-link" href="colecciones.html"><i class="bi bi-collection"></i> Colecciones</a></li>
      </ul>
      <div class="sidebar-section">Ventas</div>
      <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link" href="ventas.html"><i class="bi bi-bag-check"></i> Historial</a></li>
      </ul>
    </nav>
    <div style="padding:16px;border-top:1px solid var(--border-accent)">
      <div id="adminName" style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:8px"></div>
      <button onclick="Auth.logout()" class="btn-gg-danger w-100" style="padding:8px"><i class="bi bi-box-arrow-right me-2"></i> Salir</button>
    </div>
  </aside>

  <main class="admin-content">
    <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
      <div>
        <h1 class="text-gradient-blue" style="font-size:22px">Videojuegos</h1>
        <p style="color:var(--text-muted);font-size:14px;margin:0">Gestiona el catálogo de videojuegos</p>
      </div>
      <button class="btn-gg-primary" onclick="Admin.openAddGame()">
        <i class="bi bi-plus-circle me-2"></i> Agregar Juego
      </button>
    </div>

    <!-- SEARCH -->
    <div class="filter-bar mb-4">
      <div class="search-wrapper flex-1" style="min-width:200px">
        <i class="bi bi-search"></i>
        <input type="text" class="form-control" id="searchInput" placeholder="Buscar juego, género, plataforma..."
               oninput="Admin.renderGamesTable(this.value)" style="padding-left:44px">
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrapper">
      <table class="table-gg">
        <thead>
          <tr>
            <th>ID</th>
            <th>Juego</th>
            <th>Género</th>
            <th>Plataforma</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="gamesTableBody">
          <tr><td colspan="7" class="text-center py-4" style="color:var(--text-muted)">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- MODAL: Add/Edit Game -->
<div class="modal fade modal-gg" id="gameModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="gameModalTitle">Agregar Videojuego</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form class="form-gg" id="gameForm">
          <input type="hidden" id="gameIdField">
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label">Título *</label>
              <input type="text" class="form-control" id="gameTitle" placeholder="Nombre del videojuego" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Precio ($) *</label>
              <input type="number" class="form-control" id="gamePrice" placeholder="59.99" step="0.01" min="0" required>
            </div>
            <div class="col-12">
              <label class="form-label">Descripción *</label>
              <textarea class="form-control" id="gameDescription" rows="3" placeholder="Descripción del videojuego..." required></textarea>
            </div>
            <div class="col-md-4">
              <label class="form-label">Stock disponible *</label>
              <input type="number" class="form-control" id="gameStock" placeholder="10" min="0" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Género *</label>
              <input type="text" class="form-control" id="gameGenre" placeholder="Acción, RPG, Terror...">
            </div>
            <div class="col-md-4">
              <label class="form-label">Plataforma *</label>
              <select class="form-select" id="gamePlatform" required>
                <option value="">Seleccionar...</option>
                <option value="PlayStation">PlayStation</option>
                <option value="Nintendo">Nintendo</option>
                <option value="Xbox">Xbox</option>
                <option value="PC">PC</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label">URL de imagen</label>
              <div class="d-flex gap-2">
                <input type="url" class="form-control" id="gameImage" placeholder="https://...">
                <button type="button" class="btn-gg-secondary" onclick="Admin.previewImage('gameImage', 'gamePreviewImg')" style="white-space:nowrap">
                  <i class="bi bi-eye"></i> Preview
                </button>
              </div>
              <img id="gamePreviewImg" src="" alt="Preview" style="display:none;margin-top:8px;max-height:120px;border-radius:8px;border:1px solid var(--border-accent)">
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-gg-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn-gg-primary" onclick="Admin.saveGame()">
          <i class="bi bi-check-circle me-1"></i> Guardar
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/admin.js"></script>
<script>
  const admin = Auth.requireAdmin();
  if (admin) {
    document.getElementById('adminName').textContent = '👤 ' + admin.name;
    Admin.loadGames();
  }
</script>
</body>
</html>
