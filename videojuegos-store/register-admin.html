<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Admin — GameGalaxy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="stars-bg"></div>

<div class="auth-wrapper">
  <div class="auth-container">
    <div class="auth-logo">
      <img src="logo.png" alt="GameGalaxy" style="height:52px;width:180px;object-fit:contain;object-position:center" onerror="this.style.display='none'">
    </div>
    <div style="text-align:center;margin-bottom:20px">
      <span style="background:rgba(123,47,255,0.15);border:1px solid rgba(123,47,255,0.4);color:#aa88ff;
                   padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:2px">
        🛡️ REGISTRO ADMINISTRATIVO
      </span>
    </div>
    <h2 class="auth-title" style="background:linear-gradient(135deg,#7b2fff,#c553ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">
      Nuevo Admin
    </h2>
    <p class="auth-subtitle">Crear cuenta de administrador</p>

    <div id="formError" class="alert-gg alert-gg-danger mb-3" style="display:none"></div>
    <div id="formSuccess" class="alert-gg alert-gg-success mb-3" style="display:none"></div>

    <form class="form-gg" onsubmit="handleRegister(event)">
      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <div style="position:relative">
          <i class="bi bi-person" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);z-index:1"></i>
          <input type="text" class="form-control" id="name" placeholder="Nombre del administrador" style="padding-left:44px" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <div style="position:relative">
          <i class="bi bi-envelope" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);z-index:1"></i>
          <input type="email" class="form-control" id="email" placeholder="admin@empresa.com" style="padding-left:44px" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña segura</label>
        <div style="position:relative">
          <i class="bi bi-shield-lock" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);z-index:1"></i>
          <input type="password" class="form-control" id="password" placeholder="Mínimo 8 chars + mayúscula + número + especial" style="padding-left:44px" required oninput="checkPw(this.value)">
        </div>
        <div style="margin-top:8px;display:flex;gap:4px">
          <div id="bar1" style="height:3px;flex:1;border-radius:2px;background:var(--border-accent);transition:background 0.3s"></div>
          <div id="bar2" style="height:3px;flex:1;border-radius:2px;background:var(--border-accent);transition:background 0.3s"></div>
          <div id="bar3" style="height:3px;flex:1;border-radius:2px;background:var(--border-accent);transition:background 0.3s"></div>
          <div id="bar4" style="height:3px;flex:1;border-radius:2px;background:var(--border-accent);transition:background 0.3s"></div>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Confirmar contraseña</label>
        <div style="position:relative">
          <i class="bi bi-shield-check" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);z-index:1"></i>
          <input type="password" class="form-control" id="confirmPassword" placeholder="Repite la contraseña" style="padding-left:44px" required>
        </div>
      </div>
      <button type="submit" class="btn-gg-primary w-100" style="padding:13px;font-size:15px;background:linear-gradient(135deg,#7b2fff,#c553ff)">
        <i class="bi bi-shield-plus me-2"></i> Crear Administrador
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="login-admin.html" style="color:#aa88ff;text-decoration:none;font-size:14px">
        <i class="bi bi-arrow-left me-1"></i> Volver al login de admin
      </a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script>
  function handleRegister(e) {
    e.preventDefault();
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;

    hideFormError('formError');
    document.getElementById('formSuccess').style.display = 'none';

    if (password !== confirm) { showFormError('formError', 'Las contraseñas no coinciden.'); return; }

    const result = Auth.registerAdmin(name, email, password);
    if (result.ok) {
      document.getElementById('formSuccess').textContent = result.msg + ' Redirigiendo al login...';
      document.getElementById('formSuccess').style.display = 'block';
      setTimeout(() => window.location.href = 'login-admin.html', 1500);
    } else {
      showFormError('formError', result.msg);
    }
  }

  function checkPw(pw) {
    const checks = [pw.length >= 8, /[A-Z]/.test(pw), /[0-9]/.test(pw), /[^A-Za-z0-9]/.test(pw)];
    const colors = ['var(--danger)', 'var(--warning)', 'var(--accent-blue)', 'var(--success)'];
    const passed = checks.filter(Boolean).length;
    for (let i = 1; i <= 4; i++) {
      document.getElementById('bar' + i).style.background = i <= passed ? colors[passed - 1] : 'var(--border-accent)';
    }
  }
</script>
</body>
</html>
