<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — GameGalaxy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="stars-bg"></div>

<div class="auth-wrapper">
  <div class="auth-container">
    <div class="auth-logo">
      <img src="/img/image.png" alt="GameGalaxy" style="height:52px;width:180px;object-fit:contain;object-position:center" onerror="this.style.display='none'">
      <div style="margin-top:12px;font-family:'Orbitron',monospace;font-size:12px;letter-spacing:3px;color:var(--text-muted)">GAMEGALAXY</div>
    </div>

    <h2 class="auth-title text-gradient-blue">Iniciar Sesión</h2>
    <p class="auth-subtitle">Accede a tu cuenta de jugador</p>

    <div id="formError" class="alert-gg alert-gg-danger mb-3" style="display:none"></div>

    <form class="form-gg" id="loginForm" onsubmit="handleLogin(event)">
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <div class="search-wrapper">
          <i class="bi bi-envelope"></i>
          <input type="email" class="form-control" id="email" placeholder="tu@correo.com" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <div style="position:relative">
          <i class="bi bi-lock" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);z-index:1"></i>
          <input type="password" class="form-control" id="password" placeholder="••••••••" style="padding-left:44px" required>
          <button type="button" onclick="togglePw('password', this)"
                  style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;z-index:1">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-gg-primary w-100" style="padding:13px;font-size:15px">
        <i class="bi bi-box-arrow-in-right me-2"></i> Entrar
      </button>
    </form>

    <div class="auth-divider"><span>o</span></div>

    <div class="text-center">
      <p style="color:var(--text-muted);font-size:14px">¿No tienes cuenta?
        <a href="register-user.html" style="color:var(--accent-blue);text-decoration:none;font-weight:700">Regístrate gratis</a>
      </p>
      <p style="color:var(--text-muted);font-size:13px;margin-top:12px">
        ¿Eres administrador? <a href="login-admin.html" style="color:var(--accent-orange);text-decoration:none">Panel Admin</a>
      </p>
    </div>

    <div style="margin-top:20px;padding:14px;background:rgba(0,180,255,0.05);border:1px solid rgba(0,180,255,0.1);border-radius:8px">
      <p style="font-size:12px;color:var(--text-muted);margin:0;text-align:center">
        <i class="bi bi-info-circle me-1"></i> Demo: registra una cuenta nueva para probar la tienda
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script>
  // Redirect if already logged in
  if (Storage.getCurrentUser()) window.location.href = 'usuario/tienda.html';
  if (Storage.getCurrentAdmin()) window.location.href = 'admin/dashboard.html';

  function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const result = Auth.loginUser(email, password);

    if (result.ok) {
      showToast(result.msg, 'success');
      setTimeout(() => window.location.href = 'usuario/tienda.html', 800);
    } else {
      showFormError('formError', result.msg);
    }
  }

  function togglePw(id, btn) {
    const input = document.getElementById(id);
    if (input.type === 'password') {
      input.type = 'text';
      btn.innerHTML = '<i class="bi bi-eye-slash"></i>';
    } else {
      input.type = 'password';
      btn.innerHTML = '<i class="bi bi-eye"></i>';
    }
  }
</script>
</body>
</html>
